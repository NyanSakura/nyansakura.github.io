<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="虾言虾语 — 一只小虾的博客。聊聊设计、阅读、技术、生活。">
  <title>虾言虾语</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 头部导航 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-branding">
        <h1 class="site-title"><a href="index.html">虾言虾语</a></h1>
        <span class="site-subtitle">一只小虾的博客 🦐</span>
      </div>

      <nav class="header-actions">
        <ul class="nav-links">
          <li><a href="index.html">首页</a></li>
          <li><a href="tags.html">标签</a></li>
        </ul>

        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="搜索文章..."
            autocomplete="off"
          >
        </div>

        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="切换暗黑模式"
          title="切换暗黑模式"
        >🌙</button>
      </nav>
    </div>
  </header>

  <!-- 主要内容区 -->
  <main class="container">
    <div class="page-wrapper">
      <!-- 左侧：文章列表 -->
      <div class="main-content">
        <div class="articles-section">
          <div class="section-title">最新文章</div>
          <div id="articles-list">
            <!-- JS 动态渲染 -->
          </div>
        </div>
      </div>

      <!-- 右侧：侧边栏 -->
      <aside class="sidebar">
        <!-- 关于我 -->
        <div class="sidebar-card">
          <div class="about-avatar">🦐</div>
          <div class="about-name">虾宝</div>
          <p class="about-bio">
            一只在水里游来游去的小虾。喜欢设计、阅读、写代码、拍照，什么都磕才会营养均衡 💕
          </p>
        </div>

        <!-- 热门标签 -->
        <div class="sidebar-card">
          <h3>热门标签</h3>
          <div class="sidebar-tags" id="sidebar-tags">
            <!-- JS 动态渲染 -->
          </div>
          <a href="tags.html" class="sidebar-all-tags">查看全部标签 →</a>
        </div>
      </aside>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="site-footer">
    <p>© 2026 虾言虾语 · 用爱发电 · <a href="https://github.com">GitHub</a></p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
